<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 | Brickceline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#0f0f0f;color:#e8e8e8;min-height:100vh;}

.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-box{background:#161616;border:1px solid #2a2a2a;border-radius:16px;padding:2rem 1.8rem;width:100%;max-width:340px;}
.login-logo{text-align:center;margin-bottom:1.5rem;}
.login-logo h2{font-size:16px;font-weight:500;color:#5b9bd5;margin-bottom:4px;}
.login-logo p{font-size:12px;color:#555;}
.flabel{font-size:11px;color:#666;margin-bottom:5px;display:block;}
.finput,.fselect{width:100%;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;padding:0.6rem 0.8rem;color:#e8e8e8;font-size:13px;font-family:inherit;outline:none;}
.finput:focus,.fselect:focus{border-color:#5b9bd5;}
.login-btn{width:100%;margin-top:1rem;background:#1a5fa8;border:none;border-radius:8px;padding:0.7rem;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
.login-btn:hover{background:#1470C0;}
.login-err{color:#ff6b6b;font-size:12px;margin-top:8px;text-align:center;display:none;}

.admin-wrap{display:none;max-width:640px;margin:0 auto;padding:1.5rem 1rem 3rem;}
.admin-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;}
.admin-hdr h1{font-size:15px;font-weight:500;color:#5b9bd5;}
.logout-btn{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;padding:5px 14px;color:#666;font-size:12px;cursor:pointer;font-family:inherit;}

.section{background:#161616;border-radius:14px;padding:1.1rem;margin-bottom:10px;}
.sec-title{font-size:12px;font-weight:500;margin-bottom:0.9rem;}
.sec-title.teal{color:#2dd4bf;}
.sec-title.rose{color:#fca5a5;}
.sec-title.blue{color:#5b9bd5;}

.form-row{display:grid;gap:8px;margin-bottom:9px;}
.form-row.c2{grid-template-columns:1fr 1fr;}
.form-row.c3{grid-template-columns:1fr 1fr 1fr;}

.add-btn{border:none;border-radius:8px;padding:0.5rem 1.1rem;color:#fff;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;}
.add-btn.teal{background:#0d9488;} .add-btn.teal:hover{background:#0f766e;}
.add-btn.rose{background:#dc2626;} .add-btn.rose:hover{background:#b91c1c;}
.add-btn.blue{background:#1a5fa8;} .add-btn.blue:hover{background:#1470C0;}
.add-btn.export{background:#0f766e;width:100%;margin-top:8px;}

.del-btn{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:6px;padding:3px 9px;color:#e24b4a;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.del-btn:hover{background:#2a1515;}

.item-list{margin-top:0.7rem;display:flex;flex-direction:column;gap:5px;}
.item-row{background:#1e1e1e;border-radius:9px;padding:0.55rem 0.8rem;display:flex;align-items:flex-start;gap:8px;border-left:3px solid transparent;}
.item-row.teal{border-left-color:#0d9488;}
.item-row.rose{border-left-color:#dc2626;}
.item-row.blue{border-left-color:#1a5fa8;}
.item-main{flex:1;}
.item-name{font-size:13px;color:#e0e0e0;margin-bottom:3px;}
.item-dates{display:flex;flex-direction:column;gap:2px;}
.item-date-row{display:flex;align-items:center;gap:6px;}
.item-date{font-size:11px;color:#666;}
.item-time{font-size:11px;color:#5b9bd5;background:#0d1e33;padding:1px 6px;border-radius:8px;}
.pill-sm{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.pill-sm.teal{background:#0d2424;color:#2dd4bf;}
.pill-sm.rose{background:#28100e;color:#fca5a5;}
.pill-sm.blue{background:#0d1e33;color:#7ab0e8;}

.divider{border:none;border-top:1px solid #1e1e1e;margin:0.7rem 0;}
.empty-note{font-size:12px;color:#333;padding:4px;}

/* 달력 */
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;}
.cal-lbl{font-size:13px;font-weight:500;color:#e0e0e0;}
.cal-btns{display:flex;gap:5px;}
.cal-btn{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:7px;padding:2px 10px;cursor:pointer;font-size:13px;color:#5b9bd5;font-family:inherit;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px;}
.cdl{text-align:center;font-size:10px;color:#444;padding:2px 0;}
.cdl.s{color:#c0392b;} .cdl.sa{color:#3a7bd5;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:0.75rem;}
.cc{min-height:52px;border-radius:8px;padding:3px 3px 2px;background:#1e1e1e;cursor:pointer;transition:background 0.1s;}
.cc:hover{background:#252525;}
.cc.today{background:rgba(255,220,50,0.1);outline:1.5px solid rgba(255,220,50,0.45);}
.cc.sel{background:#0d2035;outline:1.5px solid #3a7bd5;}
.cdn{font-size:10px;font-weight:500;color:#444;text-align:right;padding-right:2px;}
.cc.today .cdn{color:#f0c040;font-weight:700;}
.cc.sel .cdn{color:#7ab0e8;}
.cchips{display:flex;flex-direction:column;gap:1px;margin-top:2px;}
.cch{font-size:8px;border-radius:3px;padding:1px 3px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;}
.cch.makeup{background:#0d9488;}
.cch.retest{background:#dc2626;}

.day-panel{background:#0d1e2e;border-radius:10px;padding:0.85rem 0.9rem;margin-top:0.5rem;border:1px solid #1a3050;}
.day-panel-title{font-size:12px;font-weight:500;color:#7ab0e8;margin-bottom:0.7rem;}
.day-students{display:flex;flex-direction:column;gap:5px;margin-bottom:0.7rem;}
.day-srow{display:flex;align-items:center;gap:8px;padding:0.4rem 0.6rem;background:#1a2a3a;border-radius:8px;}
.day-sname{flex:1;font-size:12px;color:#e0e0e0;}
.day-stime{font-size:11px;color:#5b9bd5;}

.save-indicator{font-size:11px;color:#2dd4bf;text-align:center;padding:6px;display:none;}

.back-link{text-align:center;margin-top:0.8rem;}
.back-link a{font-size:12px;color:#333;text-decoration:none;}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">
      <h2>🔒 관리자 로그인</h2>
      <p>Brickceline English Academy</p>
    </div>
    <label class="flabel">비밀번호</label>
    <input class="finput" type="password" id="pwInput" placeholder="관리자 비밀번호"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr">비밀번호가 올바르지 않습니다.</div>
  </div>
  <div style="margin-top:1.2rem;">
    <a href="index.html" style="font-size:12px;color:#333;text-decoration:none;">← 학원 홈으로</a>
  </div>
</div>

<div class="admin-wrap" id="adminWrap">
  <div class="admin-hdr">
    <h1>🛠 관리자 — Brickceline</h1>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
  <div class="save-indicator" id="saveIndicator">✅ Firebase에 저장되었습니다</div>

  <!-- 보강 -->
  <div class="section">
    <div class="sec-title teal">● 보강 테스트 학생</div>
    <div class="form-row c3">
      <div><label class="flabel">학생 이름</label><input class="finput" type="text" id="mkName" placeholder="이름"></div>
      <div><label class="flabel">날짜</label><input class="finput" type="date" id="mkDate"></div>
      <div><label class="flabel">시간</label><input class="finput" type="time" id="mkTime" value="14:00"></div>
    </div>
    <button class="add-btn teal" onclick="addMakeup()">+ 추가 → 즉시 반영</button>
    <hr class="divider">
    <div class="item-list" id="mkList"></div>
  </div>

  <!-- 재시험 -->
  <div class="section">
    <div class="sec-title rose">● 재시험 테스트 학생</div>
    <div class="form-row c3">
      <div><label class="flabel">학생 이름</label><input class="finput" type="text" id="rtName" placeholder="이름"></div>
      <div><label class="flabel">날짜</label><input class="finput" type="date" id="rtDate"></div>
      <div><label class="flabel">시간</label><input class="finput" type="time" id="rtTime" value="14:00"></div>
    </div>
    <button class="add-btn rose" onclick="addRetest()">+ 추가 → 즉시 반영</button>
    <hr class="divider">
    <div class="item-list" id="rtList"></div>
  </div>

  <!-- 달력 -->
  <div class="section">
    <div class="sec-title blue">📅 달력 스케줄 확인 & 추가</div>
    <div class="cal-hdr">
      <span class="cal-lbl" id="adm-lbl"></span>
      <div class="cal-btns">
        <button class="cal-btn" id="adm-pb">‹</button>
        <button class="cal-btn" id="adm-nb">›</button>
      </div>
    </div>
    <div class="cal-days">
      <div class="cdl s">일</div><div class="cdl">월</div><div class="cdl">화</div>
      <div class="cdl">수</div><div class="cdl">목</div><div class="cdl">금</div><div class="cdl sa">토</div>
    </div>
    <div class="cal-grid" id="adm-cal"></div>
    <div class="day-panel" id="dayPanel" style="display:none;">
      <div class="day-panel-title" id="dayTitle"></div>
      <div class="day-students" id="dayStuList"></div>
      <div class="form-row c3">
        <div><label class="flabel">학생 이름</label><input class="finput" type="text" id="scName" placeholder="이름"></div>
        <div><label class="flabel">구분</label><select class="fselect" id="scType"><option value="makeup">보강</option><option value="retest">재시험</option></select></div>
        <div><label class="flabel">시간</label><input class="finput" type="time" id="scTime" value="14:00"></div>
      </div>
      <button class="add-btn blue" style="width:100%;" onclick="addToDay()">+ 이 날짜에 추가</button>
    </div>
  </div>

  <!-- 공지사항 -->
  <div class="section">
    <div class="sec-title blue">📢 공지사항</div>
    <div class="form-row c2">
      <div><label class="flabel">분류</label><select class="fselect" id="nBadge"><option value="중요">중요</option><option value="일반">일반</option><option value="수업">수업</option></select></div>
      <div><label class="flabel">날짜</label><input class="finput" type="date" id="nDate"></div>
    </div>
    <div class="form-row"><div><label class="flabel">제목</label><input class="finput" type="text" id="nTitle" placeholder="공지 제목"></div></div>
    <div class="form-row"><div><label class="flabel">내용</label><input class="finput" type="text" id="nContent" placeholder="공지 내용"></div></div>
    <button class="add-btn blue" onclick="addNotice()">+ 공지 추가</button>
    <hr class="divider">
    <div class="item-list" id="noticeList"></div>
  </div>

  <div class="back-link"><a href="index.html">← 학원 홈으로</a></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAmJonnbBmIwdhcEonjEYE_NesFYfHT460",
  authDomain: "brickceline-79e8d.firebaseapp.com",
  databaseURL: "https://brickceline-79e8d-default-rtdb.firebaseio.com",
  projectId: "brickceline-79e8d",
  storageBucket: "brickceline-79e8d.firebasestorage.app",
  messagingSenderId: "297541019898",
  appId: "1:297541019898:web:d1b8439294b7ea73894143"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const ADMIN_PW = "2548";
const KST=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
const TY=KST.getFullYear(),TM=KST.getMonth()+1,TD=KST.getDate();

let MAKEUP={}, RETEST={}, NOTICES={}, SCHEDULE={};
let admCur={y:TY,m:TM}, selKey=null, selD=null;

window.doLogin = function(){
  if(document.getElementById('pwInput').value===ADMIN_PW){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('adminWrap').style.display='block';
    const t=new Date().toISOString().slice(0,10);
    document.getElementById('mkDate').value=t;
    document.getElementById('rtDate').value=t;
    document.getElementById('nDate').value=t;
    initListeners();
  } else {
    document.getElementById('loginErr').style.display='block';
  }
};
window.doLogout = function(){
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('adminWrap').style.display='none';
  document.getElementById('pwInput').value='';
};

function showSaved(){
  const el=document.getElementById('saveIndicator');
  el.style.display='block';
  setTimeout(()=>el.style.display='none',2000);
}

function initListeners(){
  onValue(ref(db,'makeup'),snap=>{MAKEUP=snap.val()||{};renderMakeup();});
  onValue(ref(db,'retest'),snap=>{RETEST=snap.val()||{};renderRetest();});
  onValue(ref(db,'notices'),snap=>{NOTICES=snap.val()||{};renderNotices();});
  onValue(ref(db,'schedule'),snap=>{SCHEDULE=snap.val()||{};renderAdmCal();if(selKey)showDayPanel(selKey,selD);});
}

function dn(y,m,d){return['일','월','화','수','목','금','토'][new Date(y,m-1,d).getDay()];}
function dateToKey(s){const p=s.split('-');return`${p[0]}-${parseInt(p[1])}-${parseInt(p[2])}`;}
function keyToLabel(k){const p=k.split('-');const m=parseInt(p[1]),d=parseInt(p[2]);return`${m}월 ${d}일 (${dn(parseInt(p[0]),m,d)})`;}

// 보강
function renderMakeup(){
  const entries=Object.entries(MAKEUP);
  const el=document.getElementById('mkList');
  if(!entries.length){el.innerHTML='<div class="empty-note">없음</div>';return;}
  el.innerHTML=entries.map(([fid,s])=>{
    const dates=[];
    Object.entries(SCHEDULE).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([k,obj])=>{
      Object.values(obj||{}).forEach(e=>{if(e.name===s.name&&e.type==='makeup')dates.push({label:keyToLabel(k),time:e.time});});
    });
    return`<div class="item-row teal"><span class="pill-sm teal">보강</span>
      <div class="item-main"><div class="item-name">${s.name}</div>
      <div class="item-dates">${dates.length?dates.map(d=>`<div class="item-date-row"><span class="item-date">📅 ${d.label}</span><span class="item-time">${d.time}</span></div>`).join(''):'<div style="font-size:11px;color:#333;">일정 없음</div>'}</div></div>
      <button class="del-btn" onclick="delMakeup('${fid}','${s.name}')">삭제</button></div>`;
  }).join('');
}

window.addMakeup = async function(){
  const name=document.getElementById('mkName').value.trim();
  const date=document.getElementById('mkDate').value;
  const time=document.getElementById('mkTime').value;
  if(!name){alert('이름을 입력하세요.');return;}
  await push(ref(db,'makeup'),{name});
  if(date){
    const key=dateToKey(date);
    await push(ref(db,`schedule/${key}`),{name,type:'makeup',time});
  }
  document.getElementById('mkName').value='';
  showSaved();
};

window.delMakeup = async function(fid,name){
  if(!confirm('삭제하시겠습니까?'))return;
  await remove(ref(db,`makeup/${fid}`));
  // 스케줄에서도 제거
  Object.entries(SCHEDULE).forEach(async([k,obj])=>{
    Object.entries(obj||{}).forEach(async([sid,e])=>{
      if(e.name===name&&e.type==='makeup') await remove(ref(db,`schedule/${k}/${sid}`));
    });
  });
  showSaved();
};

// 재시험
function renderRetest(){
  const entries=Object.entries(RETEST);
  const el=document.getElementById('rtList');
  if(!entries.length){el.innerHTML='<div class="empty-note">없음</div>';return;}
  el.innerHTML=entries.map(([fid,s])=>{
    const dates=[];
    Object.entries(SCHEDULE).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([k,obj])=>{
      Object.values(obj||{}).forEach(e=>{if(e.name===s.name&&e.type==='retest')dates.push({label:keyToLabel(k),time:e.time});});
    });
    return`<div class="item-row rose"><span class="pill-sm rose">재시험</span>
      <div class="item-main"><div class="item-name">${s.name}</div>
      <div class="item-dates">${dates.length?dates.map(d=>`<div class="item-date-row"><span class="item-date">📅 ${d.label}</span><span class="item-time">${d.time}</span></div>`).join(''):'<div style="font-size:11px;color:#333;">일정 없음</div>'}</div></div>
      <button class="del-btn" onclick="delRetest('${fid}','${s.name}')">삭제</button></div>`;
  }).join('');
}

window.addRetest = async function(){
  const name=document.getElementById('rtName').value.trim();
  const date=document.getElementById('rtDate').value;
  const time=document.getElementById('rtTime').value;
  if(!name){alert('이름을 입력하세요.');return;}
  await push(ref(db,'retest'),{name});
  if(date){
    const key=dateToKey(date);
    await push(ref(db,`schedule/${key}`),{name,type:'retest',time});
  }
  document.getElementById('rtName').value='';
  showSaved();
};

window.delRetest = async function(fid,name){
  if(!confirm('삭제하시겠습니까?'))return;
  await remove(ref(db,`retest/${fid}`));
  Object.entries(SCHEDULE).forEach(async([k,obj])=>{
    Object.entries(obj||{}).forEach(async([sid,e])=>{
      if(e.name===name&&e.type==='retest') await remove(ref(db,`schedule/${k}/${sid}`));
    });
  });
  showSaved();
};

// 달력
function renderAdmCal(){
  const g=document.getElementById('adm-cal');g.innerHTML='';
  const first=new Date(admCur.y,admCur.m-1,1).getDay();
  const total=new Date(admCur.y,admCur.m,0).getDate();
  for(let i=0;i<first;i++)g.appendChild(document.createElement('div'));
  for(let d=1;d<=total;d++){
    const k=`${admCur.y}-${admCur.m}-${d}`;
    const el=document.createElement('div');el.className='cc';
    if(admCur.y===TY&&admCur.m===TM&&d===TD)el.classList.add('today');
    if(selD===d)el.classList.add('sel');
    const cdn=document.createElement('div');cdn.className='cdn';cdn.textContent=d;el.appendChild(cdn);
    const ss=SCHEDULE[k]?Object.values(SCHEDULE[k]):[];
    if(ss.length){
      const ch=document.createElement('div');ch.className='cchips';
      ss.slice(0,3).forEach(s=>{const c=document.createElement('div');c.className='cch '+s.type;c.textContent=s.name.slice(0,3);ch.appendChild(c);});
      if(ss.length>3){const mo=document.createElement('div');mo.className='cch';mo.style.background='#444';mo.textContent='+'+(ss.length-3);ch.appendChild(mo);}
      el.appendChild(ch);
    }
    el.addEventListener('click',()=>{selKey=k;selD=d;renderAdmCal();showDayPanel(k,d);});
    g.appendChild(el);
  }
  document.getElementById('adm-lbl').textContent=`${admCur.y}년 ${admCur.m}월`;
}

function showDayPanel(k,d){
  document.getElementById('dayPanel').style.display='block';
  document.getElementById('dayTitle').textContent=`${admCur.m}월 ${d}일 (${dn(admCur.y,admCur.m,d)}) 수업`;
  const ss=SCHEDULE[k]?Object.entries(SCHEDULE[k]):[];
  const sl=document.getElementById('dayStuList');
  sl.innerHTML=ss.length
    ? ss.map(([sid,s])=>`<div class="day-srow"><span class="pill-sm ${s.type==='makeup'?'teal':'rose'}">${s.type==='makeup'?'보강':'재시험'}</span><span class="day-sname">${s.name}</span><span class="day-stime">${s.time}</span><button class="del-btn" onclick="delFromDay('${k}','${sid}')">삭제</button></div>`).join('')
    : '<div class="empty-note" style="color:#444;">수업 없음</div>';
}

window.addToDay = async function(){
  if(!selKey){alert('날짜를 먼저 선택하세요.');return;}
  const name=document.getElementById('scName').value.trim();
  const type=document.getElementById('scType').value;
  const time=document.getElementById('scTime').value;
  if(!name){alert('이름을 입력하세요.');return;}
  await push(ref(db,`schedule/${selKey}`),{name,type,time});
  document.getElementById('scName').value='';
  showSaved();
};

window.delFromDay = async function(k,sid){
  if(!confirm('삭제?'))return;
  await remove(ref(db,`schedule/${k}/${sid}`));
  showSaved();
};

document.getElementById('adm-pb').addEventListener('click',()=>{admCur.m--;if(admCur.m<1){admCur.m=12;admCur.y--;}selKey=null;selD=null;document.getElementById('dayPanel').style.display='none';renderAdmCal();});
document.getElementById('adm-nb').addEventListener('click',()=>{admCur.m++;if(admCur.m>12){admCur.m=1;admCur.y++;}selKey=null;selD=null;document.getElementById('dayPanel').style.display='none';renderAdmCal();});

// 공지
function renderNotices(){
  const entries=Object.entries(NOTICES).reverse();
  const el=document.getElementById('noticeList');
  if(!entries.length){el.innerHTML='<div class="empty-note">없음</div>';return;}
  el.innerHTML=entries.map(([fid,n])=>`
    <div class="item-row blue"><span class="pill-sm blue">${n.badge}</span>
    <div class="item-main"><div class="item-name">${n.title}</div><div class="item-dates"><div class="item-date-row"><span class="item-date">${n.date}</span></div></div></div>
    <button class="del-btn" onclick="delNotice('${fid}')">삭제</button></div>`).join('');
}

window.addNotice = async function(){
  const badge=document.getElementById('nBadge').value;
  const date=document.getElementById('nDate').value.replace(/-/g,'.');
  const title=document.getElementById('nTitle').value.trim();
  const content=document.getElementById('nContent').value.trim();
  if(!title){alert('제목을 입력하세요.');return;}
  await push(ref(db,'notices'),{badge,title,date,content,isNew:true});
  document.getElementById('nTitle').value='';
  document.getElementById('nContent').value='';
  showSaved();
};

window.delNotice = async function(fid){
  if(!confirm('삭제?'))return;
  await remove(ref(db,`notices/${fid}`));
  showSaved();
};
</script>
