<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 | Brickceline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#111;color:#e8e8e8;min-height:100vh;}

.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-box{background:#1a1a1a;border:1px solid #333;border-radius:16px;padding:2rem 1.8rem;width:100%;max-width:340px;}
.login-logo{text-align:center;margin-bottom:1.5rem;}
.login-logo h2{font-size:16px;font-weight:500;color:#4a9eff;margin-bottom:4px;}
.login-logo p{font-size:12px;color:#666;}
.login-label{font-size:12px;color:#888;margin-bottom:6px;display:block;}
.login-input{width:100%;background:#2a2a2a;border:1px solid #444;border-radius:8px;padding:0.6rem 0.8rem;color:#e8e8e8;font-size:14px;font-family:inherit;outline:none;}
.login-input:focus{border-color:#4a9eff;}
.login-btn{width:100%;margin-top:1rem;background:#185FA5;border:none;border-radius:8px;padding:0.7rem;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
.login-btn:hover{background:#1470C0;}
.login-err{color:#e24b4a;font-size:12px;margin-top:8px;text-align:center;display:none;}

.admin-wrap{display:none;max-width:640px;margin:0 auto;padding:1.5rem 1rem 3rem;}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.admin-header h1{font-size:16px;font-weight:500;color:#4a9eff;}
.logout-btn{background:#2a2a2a;border:1px solid #444;border-radius:8px;padding:5px 14px;color:#aaa;font-size:12px;cursor:pointer;font-family:inherit;}

.section{background:#1a1a1a;border-radius:14px;padding:1.2rem;margin-bottom:1.2rem;}
.section-title{font-size:13px;font-weight:500;color:#4a9eff;margin-bottom:1rem;}
.section-title.makeup{color:#60a5fa;}
.section-title.retest{color:#f87171;}

.form-row{display:grid;gap:8px;margin-bottom:10px;}
.form-row.cols2{grid-template-columns:1fr 1fr;}
.form-row.cols3{grid-template-columns:1fr 1fr 1fr;}
.flabel{font-size:11px;color:#888;margin-bottom:3px;display:block;}
.finput,.fselect{width:100%;background:#2a2a2a;border:1px solid #444;border-radius:8px;padding:0.55rem 0.75rem;color:#e8e8e8;font-size:13px;font-family:inherit;outline:none;}
.finput:focus,.fselect:focus{border-color:#4a9eff;}

.add-btn{border:none;border-radius:8px;padding:0.55rem 1.2rem;color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.add-btn.makeup{background:#2563EB;}
.add-btn.makeup:hover{background:#1d4ed8;}
.add-btn.retest{background:#DC2626;}
.add-btn.retest:hover{background:#b91c1c;}
.add-btn.notice{background:#185FA5;}
.add-btn.notice:hover{background:#1470C0;}
.add-btn.export{background:#0F6E56;width:100%;margin-top:8px;}
.add-btn.export:hover{background:#0d5c47;}

.del-btn{background:#2a2a2a;border:1px solid #555;border-radius:6px;padding:3px 10px;color:#e24b4a;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.del-btn:hover{background:#3a1a1a;}

.item-list{margin-top:0.75rem;display:flex;flex-direction:column;gap:6px;}
.item-row{background:#2a2a2a;border-radius:10px;padding:0.6rem 0.8rem;display:flex;align-items:center;gap:8px;border-left:3px solid transparent;}
.item-row.makeup{border-left-color:#2563EB;}
.item-row.retest{border-left-color:#DC2626;}
.item-text{flex:1;font-size:13px;color:#e8e8e8;}
.item-sub{font-size:11px;color:#666;}
.type-pill{font-size:10px;padding:2px 8px;border-radius:12px;}
.type-pill.makeup{background:#1e3a6e;color:#60a5fa;}
.type-pill.retest{background:#4a1515;color:#f87171;}

.divider{border:none;border-top:1px solid #333;margin:0.75rem 0;}
.back-link{text-align:center;margin-top:1rem;}
.back-link a{font-size:12px;color:#555;text-decoration:none;}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">
      <h2>🔒 관리자 로그인</h2>
      <p>Brickceline English Academy</p>
    </div>
    <label class="login-label">비밀번호</label>
    <input class="login-input" type="password" id="pwInput" placeholder="비밀번호를 입력하세요"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr">비밀번호가 올바르지 않습니다.</div>
  </div>
  <div style="margin-top:1.2rem;">
    <a href="index.html" style="font-size:12px;color:#444;text-decoration:none;">← 학원 홈으로</a>
  </div>
</div>

<div class="admin-wrap" id="adminWrap">
  <div class="admin-header">
    <h1>🛠 관리자 — Brickceline</h1>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>

  <!-- 보강 테스트 학생 -->
  <div class="section">
    <div class="section-title makeup">🔵 보강 테스트 학생 관리</div>
    <div class="form-row">
      <div>
        <label class="flabel">학생 이름</label>
        <input class="finput" type="text" id="makeupName" placeholder="학생 이름 입력">
      </div>
    </div>
    <button class="add-btn makeup" onclick="addMakeupStudent()">+ 보강 학생 추가</button>
    <hr class="divider">
    <div class="item-list" id="makeupStudentList"></div>
  </div>

  <!-- 재시험 테스트 학생 -->
  <div class="section">
    <div class="section-title retest">🔴 재시험 테스트 학생 관리</div>
    <div class="form-row">
      <div>
        <label class="flabel">학생 이름</label>
        <input class="finput" type="text" id="retestName" placeholder="학생 이름 입력">
      </div>
    </div>
    <button class="add-btn retest" onclick="addRetestStudent()">+ 재시험 학생 추가</button>
    <hr class="divider">
    <div class="item-list" id="retestStudentList"></div>
  </div>

  <!-- 스케줄 -->
  <div class="section">
    <div class="section-title">📅 수업 스케줄 관리</div>
    <div class="form-row cols3">
      <div>
        <label class="flabel">날짜</label>
        <input class="finput" type="date" id="scDate">
      </div>
      <div>
        <label class="flabel">학생 이름</label>
        <input class="finput" type="text" id="scName" placeholder="이름">
      </div>
      <div>
        <label class="flabel">시간</label>
        <input class="finput" type="time" id="scTime" value="14:00">
      </div>
    </div>
    <div class="form-row">
      <div>
        <label class="flabel">구분</label>
        <select class="fselect" id="scType">
          <option value="makeup">보강 테스트 (파란색)</option>
          <option value="retest">재시험 테스트 (빨간색)</option>
        </select>
      </div>
    </div>
    <button class="add-btn notice" onclick="addSchedule()">+ 수업 추가</button>
    <hr class="divider">
    <div class="item-list" id="scheduleList"></div>
  </div>

  <!-- 공지사항 -->
  <div class="section">
    <div class="section-title">📢 공지사항 관리</div>
    <div class="form-row cols2">
      <div>
        <label class="flabel">분류</label>
        <select class="fselect" id="nBadge">
          <option value="중요">중요</option>
          <option value="일반">일반</option>
          <option value="수업">수업</option>
        </select>
      </div>
      <div>
        <label class="flabel">날짜</label>
        <input class="finput" type="date" id="nDate">
      </div>
    </div>
    <div class="form-row">
      <div>
        <label class="flabel">제목</label>
        <input class="finput" type="text" id="nTitle" placeholder="공지 제목">
      </div>
    </div>
    <div class="form-row">
      <div>
        <label class="flabel">내용</label>
        <input class="finput" type="text" id="nContent" placeholder="공지 내용">
      </div>
    </div>
    <button class="add-btn notice" onclick="addNotice()">+ 공지 추가</button>
    <hr class="divider">
    <div class="item-list" id="noticeList"></div>
  </div>

  <!-- 내보내기 -->
  <div class="section">
    <div class="section-title">📋 data.js 내보내기</div>
    <p style="font-size:12px;color:#888;margin-bottom:0.75rem;">
      ① 복사 → ② VSCode에서 data.js 열기 → ③ 전체선택(⌘A) → ④ 붙여넣기(⌘V) → ⑤ 저장(⌘S) → ⑥ GitHub 업로드
    </p>
    <textarea id="exportCode" readonly
      style="width:100%;height:220px;background:#0a0a0a;border:1px solid #333;border-radius:8px;padding:0.75rem;color:#7ab8f5;font-size:11px;font-family:monospace;resize:vertical;outline:none;"></textarea>
    <button class="add-btn export" onclick="copyCode()">📋 클립보드에 복사하기</button>
  </div>

  <div class="back-link"><a href="index.html">← 학원 홈으로</a></div>
</div>

<script src="data.js"></script>
<script>
let localMakeup   = JSON.parse(JSON.stringify(MAKEUP_STUDENTS));
let localRetest   = JSON.parse(JSON.stringify(RETEST_STUDENTS));
let localNotices  = JSON.parse(JSON.stringify(NOTICES));
let localSchedule = JSON.parse(JSON.stringify(SCHEDULE));

function doLogin() {
  if (document.getElementById('pwInput').value === ACADEMY.adminPassword) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'block';
    document.getElementById('nDate').value = new Date().toISOString().slice(0,10);
    document.getElementById('scDate').value = new Date().toISOString().slice(0,10);
    renderAll();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}
function doLogout() {
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById('pwInput').value = '';
  document.getElementById('loginErr').style.display = 'none';
}
function renderAll() {
  renderMakeupStudents(); renderRetestStudents();
  renderSchedule(); renderNotices(); exportCode();
}

// 보강 학생
function renderMakeupStudents() {
  document.getElementById('makeupStudentList').innerHTML = localMakeup.length
    ? localMakeup.map((s,i)=>`
        <div class="item-row makeup">
          <span class="type-pill makeup">보강</span>
          <div class="item-text">${s.name}</div>
          <button class="del-btn" onclick="delMakeup(${i})">삭제</button>
        </div>`).join('')
    : '<div style="font-size:12px;color:#555;padding:4px;">없음</div>';
}
function addMakeupStudent() {
  const name = document.getElementById('makeupName').value.trim();
  if(!name){alert('이름을 입력하세요.');return;}
  localMakeup.push({name});
  document.getElementById('makeupName').value='';
  renderAll();
}
function delMakeup(i){if(!confirm('삭제?'))return;localMakeup.splice(i,1);renderAll();}

// 재시험 학생
function renderRetestStudents() {
  document.getElementById('retestStudentList').innerHTML = localRetest.length
    ? localRetest.map((s,i)=>`
        <div class="item-row retest">
          <span class="type-pill retest">재시험</span>
          <div class="item-text">${s.name}</div>
          <button class="del-btn" onclick="delRetest(${i})">삭제</button>
        </div>`).join('')
    : '<div style="font-size:12px;color:#555;padding:4px;">없음</div>';
}
function addRetestStudent() {
  const name = document.getElementById('retestName').value.trim();
  if(!name){alert('이름을 입력하세요.');return;}
  localRetest.push({name});
  document.getElementById('retestName').value='';
  renderAll();
}
function delRetest(i){if(!confirm('삭제?'))return;localRetest.splice(i,1);renderAll();}

// 스케줄
function renderSchedule() {
  const entries = Object.entries(localSchedule).sort((a,b)=>a[0].localeCompare(b[0])).slice(-15);
  document.getElementById('scheduleList').innerHTML = entries.length
    ? entries.map(([k,arr])=>arr.map((s,si)=>`
        <div class="item-row ${s.type}">
          <span class="type-pill ${s.type}">${s.type==='makeup'?'보강':'재시험'}</span>
          <div class="item-text">${s.name} — ${s.time}<div class="item-sub">${k}</div></div>
          <button class="del-btn" onclick="delSchedule('${k}',${si})">삭제</button>
        </div>`).join('')).join('')
    : '<div style="font-size:12px;color:#555;padding:4px;">없음</div>';
}
function addSchedule() {
  const dateVal = document.getElementById('scDate').value;
  const name    = document.getElementById('scName').value.trim();
  const time    = document.getElementById('scTime').value;
  const type    = document.getElementById('scType').value;
  if(!dateVal||!name){alert('날짜와 이름을 입력하세요.');return;}
  const p=dateVal.split('-');
  const key=`${p[0]}-${parseInt(p[1])}-${parseInt(p[2])}`;
  if(!localSchedule[key]) localSchedule[key]=[];
  localSchedule[key].push({name,type,time});
  document.getElementById('scName').value='';
  renderAll();
}
function delSchedule(key,si){
  if(!confirm('삭제?'))return;
  localSchedule[key].splice(si,1);
  if(!localSchedule[key].length) delete localSchedule[key];
  renderAll();
}

// 공지
function renderNotices() {
  document.getElementById('noticeList').innerHTML = localNotices.length
    ? localNotices.map((n,i)=>`
        <div class="item-row" style="border-left-color:#4a9eff;">
          <span class="type-pill makeup">${n.badge}</span>
          <div class="item-text">${n.title}<div class="item-sub">${n.date}</div></div>
          <button class="del-btn" onclick="delNotice(${i})">삭제</button>
        </div>`).join('')
    : '<div style="font-size:12px;color:#555;padding:4px;">없음</div>';
}
function addNotice() {
  const badge  = document.getElementById('nBadge').value;
  const date   = document.getElementById('nDate').value.replace(/-/g,'.');
  const title  = document.getElementById('nTitle').value.trim();
  const content= document.getElementById('nContent').value.trim();
  if(!title){alert('제목을 입력하세요.');return;}
  localNotices.unshift({id:Date.now(),badge,title,date,content,isNew:true});
  document.getElementById('nTitle').value='';
  document.getElementById('nContent').value='';
  renderAll();
}
function delNotice(i){if(!confirm('삭제?'))return;localNotices.splice(i,1);renderAll();}

// 내보내기
function exportCode() {
  document.getElementById('exportCode').value=
`// ============================================================
//  Brickceline 영어학원 데이터 파일
// ============================================================

const ACADEMY = {
  name: "${ACADEMY.name}",
  nameEn: "${ACADEMY.nameEn}",
  tagline: "${ACADEMY.tagline}",
  adminPassword: "${ACADEMY.adminPassword}"
};

const MAKEUP_STUDENTS = ${JSON.stringify(localMakeup,null,2)};

const RETEST_STUDENTS = ${JSON.stringify(localRetest,null,2)};

const NOTICES = ${JSON.stringify(localNotices,null,2)};

const SCHEDULE = ${JSON.stringify(localSchedule,null,2)};`;
}
function copyCode() {
  const ta=document.getElementById('exportCode');
  ta.select(); document.execCommand('copy');
  alert('복사 완료!\nVSCode에서 data.js 열기 → ⌘A → ⌘V → ⌘S\n그 다음 GitHub에 업로드하세요.');
}
</script>
</body>
</html>
