<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>브릭셀린 영어학원 | Brickceline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#111;color:#e8e8e8;}
.app{max-width:420px;margin:0 auto;padding-bottom:2.5rem;}

/* HERO */
.hero{background:#185FA5;padding:1.4rem 1.2rem 1.2rem;position:relative;overflow:hidden;}
.hero-deco{position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;background:#0C447C;opacity:0.4;}
.hero-deco2{position:absolute;right:20px;bottom:-30px;width:80px;height:80px;border-radius:50%;background:#378ADD;opacity:0.25;}
.hero-tag{display:inline-block;background:#378ADD;color:#E6F1FB;font-size:10px;padding:3px 9px;border-radius:20px;margin-bottom:8px;letter-spacing:0.5px;position:relative;}
.hero h1{color:#fff;font-size:21px;font-weight:500;line-height:1.3;position:relative;}
.hero p{color:#B5D4F4;font-size:12px;margin-top:5px;position:relative;line-height:1.6;}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:1rem;position:relative;}
.hstat{background:rgba(255,255,255,0.12);border-radius:10px;padding:8px 6px;text-align:center;cursor:pointer;transition:background 0.15s;}
.hstat:hover{background:rgba(255,255,255,0.22);}
.hstat-n{color:#fff;font-size:17px;font-weight:500;}
.hstat-l{color:#B5D4F4;font-size:10px;margin-top:2px;}

/* 공지사항 */
.dark-section{background:#1a1a1a;padding:0.85rem 1rem 1rem;}
.ds-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.7rem;}
.ds-label{font-size:13px;font-weight:500;color:#4a9eff;}
.ds-more{font-size:12px;color:#888;cursor:pointer;}

.ncard{background:#2a2a2a;border-radius:12px;padding:0.8rem 1rem;margin-bottom:8px;cursor:pointer;border-left:3px solid transparent;transition:background 0.15s;}
.ncard.highlight{border-left-color:#185FA5;border-radius:0 12px 12px 0;}
.ncard:hover{background:#333;}
.ntop{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.nbadge{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:500;}
.nbadge.중요{background:#1e3a5f;color:#7ab8f5;}
.nbadge.일반{background:#2a2a3a;color:#aaa;}
.nbadge.수업{background:#1a3a1a;color:#7abf7a;}
.new-dot{width:7px;height:7px;border-radius:50%;background:#e24b4a;margin-left:auto;flex-shrink:0;}
.ntitle{font-size:13px;color:#e8e8e8;font-weight:500;}
.ndate{font-size:11px;color:#666;}
.nexpand{font-size:12px;color:#999;margin-top:7px;line-height:1.7;display:none;border-top:1px solid #383838;padding-top:8px;}
.ncard.open .nexpand{display:block;}

/* 학생 스케줄 영역 */
.schedule-section{background:#1a1a1a;margin-top:2px;padding:0.9rem 1rem 1.2rem;}
.schedule-top{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap;}
.schedule-title{font-size:13px;font-weight:500;color:#4a9eff;margin-right:4px;}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;}
.pill.makeup{background:#1e3a6e;color:#60a5fa;border:1px solid #2563EB;}
.pill.retest{background:#4a1515;color:#f87171;border:1px solid #DC2626;}
.pill-dot{width:7px;height:7px;border-radius:50%;}
.pill-dot.makeup{background:#60a5fa;}
.pill-dot.retest{background:#f87171;}

/* 학생 카드 그리드 */
.students-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.student-group{background:#2a2a2a;border-radius:12px;padding:0.8rem 1rem;}
.group-header{display:flex;align-items:center;gap:6px;margin-bottom:0.7rem;padding-bottom:0.5rem;border-bottom:1px solid #383838;}
.group-title{font-size:12px;font-weight:500;}
.group-title.makeup{color:#60a5fa;}
.group-title.retest{color:#f87171;}
.group-count{font-size:11px;color:#666;margin-left:auto;}
.student-name-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #2f2f2f;}
.student-name-row:last-child{border-bottom:none;}
.name-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.name-dot.makeup{background:#2563EB;}
.name-dot.retest{background:#DC2626;}
.name-text{font-size:12px;color:#e8e8e8;}

/* 오버레이 */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#111;z-index:100;overflow-y:auto;}
.overlay.active{display:block;}
.overlay-inner{max-width:420px;margin:0 auto;padding:1rem 1rem 3rem;}
.overlay-header{display:flex;align-items:center;gap:12px;padding:0.8rem 0 1rem;}
.back-btn{background:#2a2a2a;border:none;border-radius:8px;padding:6px 14px;color:#aaa;font-size:13px;cursor:pointer;font-family:inherit;}
.back-btn:hover{background:#333;}
.overlay-title{font-size:15px;font-weight:500;color:#e8e8e8;}

.admin-link{text-align:center;padding:1rem 0 0;background:#1a1a1a;}
.admin-link a{font-size:11px;color:#333;text-decoration:none;}
.admin-link a:hover{color:#555;}
</style>
</head>
<body>
<div class="app" id="mainApp">

<!-- HERO -->
<div class="hero">
  <div class="hero-deco"></div>
  <div class="hero-deco2"></div>
  <div class="hero-tag" id="heroTag"></div>
  <h1 id="heroTitle"></h1>
  <p id="heroTagline"></p>
  <div class="hero-stats">
    <div class="hstat" onclick="openOverlay('makeup')">
      <div class="hstat-n" id="statMakeup">-</div>
      <div class="hstat-l">보강 테스트</div>
    </div>
    <div class="hstat" onclick="openOverlay('retest')">
      <div class="hstat-n" id="statRetest">-</div>
      <div class="hstat-l">재시험 테스트</div>
    </div>
    <div class="hstat" onclick="openOverlay('notice')">
      <div class="hstat-n" id="statNotice">-</div>
      <div class="hstat-l">공지사항</div>
    </div>
  </div>
</div>

<!-- 공지사항 -->
<div class="dark-section">
  <div class="ds-top">
    <span class="ds-label">공지사항</span>
    <span class="ds-more" onclick="openOverlay('notice')">전체보기 →</span>
  </div>
  <div id="notice-list"></div>
</div>

<!-- 학생 스케줄 -->
<div class="schedule-section">
  <div class="schedule-top">
    <span class="schedule-title">학생 스케줄</span>
    <span class="pill makeup"><span class="pill-dot makeup"></span>보강 테스트 <strong id="makeupPillCount">-</strong>명</span>
    <span class="pill retest"><span class="pill-dot retest"></span>재시험 테스트 <strong id="retestPillCount">-</strong>명</span>
  </div>

  <div class="students-grid">
    <!-- 보강 그룹 -->
    <div class="student-group">
      <div class="group-header">
        <span class="group-title makeup">보강 테스트</span>
        <span class="group-count" id="makeupGroupCount"></span>
      </div>
      <div id="makeupNameList"></div>
    </div>
    <!-- 재시험 그룹 -->
    <div class="student-group">
      <div class="group-header">
        <span class="group-title retest">재시험 테스트</span>
        <span class="group-count" id="retestGroupCount"></span>
      </div>
      <div id="retestNameList"></div>
    </div>
  </div>
</div>

<div class="admin-link"><a href="admin.html">🔒 관리자</a></div>
</div>

<!-- 오버레이 -->
<div class="overlay" id="overlay">
  <div class="overlay-inner">
    <div class="overlay-header">
      <button class="back-btn" onclick="closeOverlay()">← 뒤로</button>
      <span class="overlay-title" id="overlayTitle"></span>
    </div>
    <div id="overlayBody"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
// 히어로
document.getElementById('heroTag').textContent = ACADEMY.nameEn;
document.getElementById('heroTitle').textContent = ACADEMY.name;
document.getElementById('heroTagline').textContent = ACADEMY.tagline;
document.getElementById('statMakeup').textContent = MAKEUP_STUDENTS.length;
document.getElementById('statRetest').textContent = RETEST_STUDENTS.length;
document.getElementById('statNotice').textContent = NOTICES.length;

// 공지사항 (전체 4건 표시)
const nl = document.getElementById('notice-list');
NOTICES.forEach((n, i) => {
  const el = document.createElement('div');
  el.className = 'ncard' + (i === 0 ? ' highlight open' : '');
  el.innerHTML = `
    <div class="ntop">
      <span class="nbadge ${n.badge}">${n.badge}</span>
      <span class="ntitle">${n.title}</span>
      ${n.isNew ? '<span class="new-dot"></span>' : ''}
    </div>
    <div class="ndate">${n.date}</div>
    <div class="nexpand">${n.content}</div>`;
  el.addEventListener('click', () => el.classList.toggle('open'));
  nl.appendChild(el);
});

// 학생 스케줄 영역
document.getElementById('makeupPillCount').textContent = MAKEUP_STUDENTS.length;
document.getElementById('retestPillCount').textContent = RETEST_STUDENTS.length;
document.getElementById('makeupGroupCount').textContent = MAKEUP_STUDENTS.length + '명';
document.getElementById('retestGroupCount').textContent = RETEST_STUDENTS.length + '명';

const makeupList = document.getElementById('makeupNameList');
MAKEUP_STUDENTS.forEach(s => {
  makeupList.innerHTML += `
    <div class="student-name-row">
      <div class="name-dot makeup"></div>
      <span class="name-text">${s.name}</span>
    </div>`;
});

const retestList = document.getElementById('retestNameList');
RETEST_STUDENTS.forEach(s => {
  retestList.innerHTML += `
    <div class="student-name-row">
      <div class="name-dot retest"></div>
      <span class="name-text">${s.name}</span>
    </div>`;
});

// 오버레이
function openOverlay(type) {
  const overlay = document.getElementById('overlay');
  const title   = document.getElementById('overlayTitle');
  const body    = document.getElementById('overlayBody');
  overlay.classList.add('active');
  body.innerHTML = '';

  if (type === 'makeup') {
    title.textContent = '🔵 보강 테스트';
    body.innerHTML = `<div style="margin-bottom:1rem;font-size:12px;color:#888;">대상 학생 ${MAKEUP_STUDENTS.length}명</div>`;
    MAKEUP_STUDENTS.forEach(s => {
      body.innerHTML += `
        <div class="ncard" style="border-left:3px solid #2563EB;border-radius:0 12px 12px 0;">
          <div class="ntop">
            <div style="width:26px;height:26px;border-radius:50%;background:#2563EB;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#fff;flex-shrink:0;">${s.name[0]}</div>
            <span class="ntitle">${s.name}</span>
            <span style="font-size:11px;color:#60a5fa;background:#1e3a6e;padding:2px 8px;border-radius:10px;">보강</span>
          </div>
        </div>`;
    });

  } else if (type === 'retest') {
    title.textContent = '🔴 재시험 테스트';
    body.innerHTML = `<div style="margin-bottom:1rem;font-size:12px;color:#888;">대상 학생 ${RETEST_STUDENTS.length}명</div>`;
    RETEST_STUDENTS.forEach(s => {
      body.innerHTML += `
        <div class="ncard" style="border-left:3px solid #DC2626;border-radius:0 12px 12px 0;">
          <div class="ntop">
            <div style="width:26px;height:26px;border-radius:50%;background:#DC2626;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#fff;flex-shrink:0;">${s.name[0]}</div>
            <span class="ntitle">${s.name}</span>
            <span style="font-size:11px;color:#f87171;background:#4a1515;padding:2px 8px;border-radius:10px;">재시험</span>
          </div>
        </div>`;
    });

  } else if (type === 'notice') {
    title.textContent = '📢 공지사항 전체';
    NOTICES.forEach((n, i) => {
      const el = document.createElement('div');
      el.className = 'ncard' + (i === 0 ? ' highlight open' : '');
      el.innerHTML = `
        <div class="ntop">
          <span class="nbadge ${n.badge}">${n.badge}</span>
          <span class="ntitle">${n.title}</span>
          ${n.isNew ? '<span class="new-dot"></span>' : ''}
        </div>
        <div class="ndate">${n.date}</div>
        <div class="nexpand">${n.content}</div>`;
      el.addEventListener('click', () => el.classList.toggle('open'));
      body.appendChild(el);
    });
  }
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
}
</script>
</body>
</html>
