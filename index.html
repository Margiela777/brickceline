<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>브릭셀린 영어학원 | Brickceline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#0f0f0f;color:#e8e8e8;}
.app{max-width:420px;margin:0 auto;padding-bottom:3rem;}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,#1a5fa8 0%,#0d3d72 100%);padding:1.4rem 1.2rem 1.2rem;position:relative;overflow:hidden;}
.hero-deco{position:absolute;right:-24px;top:-24px;width:130px;height:130px;border-radius:50%;background:#0C447C;opacity:0.35;}
.hero-deco2{position:absolute;right:16px;bottom:-32px;width:90px;height:90px;border-radius:50%;background:#378ADD;opacity:0.2;}
.hero-tag{display:inline-block;background:rgba(255,255,255,0.18);color:#dceeff;font-size:10px;padding:3px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:0.6px;position:relative;}
.hero h1{color:#fff;font-size:20px;font-weight:500;line-height:1.35;position:relative;}
.hero p{color:#a8ccf0;font-size:11.5px;margin-top:5px;position:relative;line-height:1.6;}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:1rem;position:relative;}
.hstat{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:9px 6px;text-align:center;cursor:pointer;transition:all 0.15s;}
.hstat:hover{background:rgba(255,255,255,0.2);}
.hstat-n{color:#fff;font-size:18px;font-weight:600;}
.hstat-l{color:#a8ccf0;font-size:10px;margin-top:3px;}

/* ── 공지사항 ── */
.section{background:#161616;padding:1rem 1rem 1.1rem;margin-top:3px;}
.sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;}
.sec-label{font-size:13px;font-weight:500;color:#5b9bd5;}
.sec-more{font-size:11px;color:#555;cursor:pointer;transition:color 0.1s;}
.sec-more:hover{color:#888;}

.ncard{background:#1e1e1e;border-radius:10px;padding:0.75rem 0.9rem;margin-bottom:6px;cursor:pointer;border-left:3px solid transparent;transition:background 0.12s;}
.ncard:last-child{margin-bottom:0;}
.ncard.highlight{border-left-color:#5b9bd5;border-radius:0 10px 10px 0;}
.ncard:hover{background:#252525;}
.ntop{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.nbadge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;}
.nbadge.중요{background:#1a3356;color:#7ab0e8;}
.nbadge.일반{background:#222;color:#888;}
.nbadge.수업{background:#1a2e1a;color:#7abf7a;}
.new-dot{width:6px;height:6px;border-radius:50%;background:#ff6b6b;margin-left:auto;flex-shrink:0;}
.ntitle{font-size:13px;color:#e0e0e0;font-weight:500;}
.ndate{font-size:11px;color:#555;}
.nexpand{font-size:12px;color:#888;margin-top:6px;line-height:1.7;display:none;border-top:1px solid #2a2a2a;padding-top:7px;}
.ncard.open .nexpand{display:block;}

/* ── 스케줄 섹션 ── */
.schedule-sec{background:#161616;padding:1rem 1rem 0;margin-top:3px;}
.cal-header{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:0.8rem;}
.cal-title{font-size:13px;font-weight:500;color:#5b9bd5;}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid transparent;}
.pill.makeup{background:#0d2b1a;color:#4ade80;border-color:#166534;}
.pill.retest{background:#2d1010;color:#fb923c;border-color:#9a3412;}
.pill-dot{width:6px;height:6px;border-radius:50%;}
.pill-dot.makeup{background:#4ade80;}
.pill-dot.retest{background:#fb923c;}
.cal-nav{display:flex;align-items:center;gap:6px;margin-left:auto;}
.cal-lbl{font-size:13px;font-weight:500;color:#e0e0e0;}
.cal-btn{background:#1e1e1e;border:1px solid #333;border-radius:7px;padding:2px 10px;cursor:pointer;font-size:13px;color:#5b9bd5;font-family:inherit;}
.cal-btn:hover{background:#252525;}

/* ── 달력 ── */
.cal-wrap{padding:0 0 0.75rem;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px;}
.cdl{text-align:center;font-size:10px;color:#444;padding:3px 0;}
.cdl.s{color:#c0392b;} .cdl.sa{color:#3a7bd5;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cc{min-height:54px;border-radius:8px;padding:3px 3px 2px;background:#1e1e1e;cursor:pointer;transition:background 0.1s;position:relative;}
.cc:hover{background:#252525;}
.cc.today{background:rgba(255,220,50,0.13);outline:1.5px solid rgba(255,220,50,0.55);}
.cc.sel{background:#0d2137;outline:1.5px solid #3a7bd5;}
.cdn{font-size:10px;font-weight:500;color:#555;text-align:right;padding-right:2px;}
.cc.today .cdn{color:#f0c040;font-weight:700;}
.cc.sel .cdn{color:#7ab0e8;}
.cchips{display:flex;flex-direction:column;gap:1px;margin-top:2px;}
.cch{font-size:8px;border-radius:3px;padding:1px 3px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;}
.cch.makeup{background:#15803d;}
.cch.retest{background:#ea580c;}

/* ── 상세 ── */
.detail-wrap{background:#161616;padding:0 1rem 1.2rem;}
.detail-card{background:#1e1e1e;border-radius:12px;overflow:hidden;}
.dhead{background:#0d2b4a;padding:0.65rem 1rem;display:flex;align-items:center;justify-content:space-between;}
.dhead-date{color:#fff;font-size:13px;font-weight:500;}
.dhead-cnt{color:#7ab0e8;font-size:12px;}
.dbody{padding:0.3rem 0;}
.srow{display:flex;align-items:center;gap:10px;padding:0.45rem 1rem;border-bottom:1px solid #252525;}
.srow:last-child{border-bottom:none;}
.savatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;}
.savatar.makeup{background:#15803d;}
.savatar.retest{background:#ea580c;}
.sname{font-size:13px;color:#e0e0e0;flex:1;}
.stype-badge{font-size:10px;padding:2px 7px;border-radius:10px;}
.stype-badge.makeup{background:#0d2b1a;color:#4ade80;}
.stype-badge.retest{background:#2d1010;color:#fb923c;}
.stime{font-size:11px;color:#5b9bd5;background:#0d2137;padding:2px 8px;border-radius:10px;}
.empty-msg{text-align:center;font-size:12px;color:#444;padding:1.2rem 0;}

/* ── 오버레이 ── */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0f0f0f;z-index:100;overflow-y:auto;}
.overlay.active{display:block;}
.overlay-inner{max-width:420px;margin:0 auto;padding:1rem 1rem 3rem;}
.overlay-hdr{display:flex;align-items:center;gap:12px;padding:0.8rem 0 1rem;border-bottom:1px solid #222;margin-bottom:0.75rem;}
.back-btn{background:#1e1e1e;border:1px solid #333;border-radius:8px;padding:5px 13px;color:#888;font-size:12px;cursor:pointer;font-family:inherit;}
.back-btn:hover{background:#252525;}
.overlay-title{font-size:15px;font-weight:500;color:#e0e0e0;}

.admin-link{text-align:center;padding:0.9rem 0;background:#161616;}
.admin-link a{font-size:11px;color:#2a2a2a;text-decoration:none;}
.admin-link a:hover{color:#444;}
</style>
</head>
<body>
<div class="app" id="mainApp">

<div class="hero">
  <div class="hero-deco"></div><div class="hero-deco2"></div>
  <div class="hero-tag" id="heroTag"></div>
  <h1 id="heroTitle"></h1>
  <p id="heroTagline"></p>
  <div class="hero-stats">
    <div class="hstat" onclick="openOverlay('makeup')">
      <div class="hstat-n" id="statMakeup">-</div>
      <div class="hstat-l">보강 테스트</div>
    </div>
    <div class="hstat" onclick="openOverlay('retest')">
      <div class="hstat-n" id="statRetest">-</div>
      <div class="hstat-l">재시험 테스트</div>
    </div>
    <div class="hstat" onclick="openOverlay('notice')">
      <div class="hstat-n" id="statNotice">-</div>
      <div class="hstat-l">공지사항</div>
    </div>
  </div>
</div>

<div class="section">
  <div class="sec-row">
    <span class="sec-label">공지사항</span>
    <span class="sec-more" onclick="openOverlay('notice')">전체보기 →</span>
  </div>
  <div id="notice-list"></div>
</div>

<div class="schedule-sec">
  <div class="cal-header">
    <span class="cal-title">학생 스케줄</span>
    <span class="pill makeup"><span class="pill-dot makeup"></span>보강 <strong id="mkPill">-</strong>명</span>
    <span class="pill retest"><span class="pill-dot retest"></span>재시험 <strong id="rtPill">-</strong>명</span>
    <div class="cal-nav">
      <button class="cal-btn" id="pb">‹</button>
      <span class="cal-lbl" id="month-lbl"></span>
      <button class="cal-btn" id="nb">›</button>
    </div>
  </div>
  <div class="cal-wrap">
    <div class="cal-days">
      <div class="cdl s">일</div><div class="cdl">월</div><div class="cdl">화</div>
      <div class="cdl">수</div><div class="cdl">목</div><div class="cdl">금</div><div class="cdl sa">토</div>
    </div>
    <div class="cal-grid" id="cal"></div>
  </div>
</div>

<div class="detail-wrap">
  <div class="detail-card">
    <div class="dhead">
      <span class="dhead-date" id="ddate">날짜를 선택하세요</span>
      <span class="dhead-cnt" id="dcnt"></span>
    </div>
    <div class="dbody" id="dbody"><div class="empty-msg">날짜를 탭하면 수업 학생을 확인해요</div></div>
  </div>
</div>

<div class="admin-link"><a href="admin.html">🔒 관리자</a></div>
</div>

<!-- 오버레이 -->
<div class="overlay" id="overlay">
  <div class="overlay-inner">
    <div class="overlay-hdr">
      <button class="back-btn" onclick="closeOverlay()">← 뒤로</button>
      <span class="overlay-title" id="overlayTitle"></span>
    </div>
    <div id="overlayBody"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
// 한국 현재 날짜
const KST = new Date(new Date().toLocaleString('en-US', {timeZone:'Asia/Seoul'}));
const TODAY_Y = KST.getFullYear();
const TODAY_M = KST.getMonth() + 1;
const TODAY_D = KST.getDate();

// 히어로
document.getElementById('heroTag').textContent = ACADEMY.nameEn;
document.getElementById('heroTitle').textContent = ACADEMY.name;
document.getElementById('heroTagline').textContent = ACADEMY.tagline;
document.getElementById('statMakeup').textContent = MAKEUP_STUDENTS.length;
document.getElementById('statRetest').textContent = RETEST_STUDENTS.length;
document.getElementById('statNotice').textContent = NOTICES.length;
document.getElementById('mkPill').textContent = MAKEUP_STUDENTS.length;
document.getElementById('rtPill').textContent = RETEST_STUDENTS.length;

// 공지
const nl = document.getElementById('notice-list');
NOTICES.forEach((n, i) => {
  const el = document.createElement('div');
  el.className = 'ncard' + (i === 0 ? ' highlight open' : '');
  el.innerHTML = `
    <div class="ntop">
      <span class="nbadge ${n.badge}">${n.badge}</span>
      <span class="ntitle">${n.title}</span>
      ${n.isNew ? '<span class="new-dot"></span>' : ''}
    </div>
    <div class="ndate">${n.date}</div>
    <div class="nexpand">${n.content}</div>`;
  el.addEventListener('click', () => el.classList.toggle('open'));
  nl.appendChild(el);
});

// 달력 — 현재 월로 시작
let cur = { y: TODAY_Y, m: TODAY_M }, selD = null;
function dayName(y,m,d){return['일','월','화','수','목','금','토'][new Date(y,m-1,d).getDay()];}

function renderCal() {
  const g = document.getElementById('cal');
  g.innerHTML = '';
  const first = new Date(cur.y, cur.m-1, 1).getDay();
  const total = new Date(cur.y, cur.m, 0).getDate();
  for (let i=0; i<first; i++) g.appendChild(document.createElement('div'));
  for (let d=1; d<=total; d++) {
    const k = `${cur.y}-${cur.m}-${d}`;
    const el = document.createElement('div'); el.className='cc';
    const isToday = cur.y===TODAY_Y && cur.m===TODAY_M && d===TODAY_D;
    if (isToday) el.classList.add('today');
    if (selD===d) el.classList.add('sel');
    const dn = document.createElement('div'); dn.className='cdn'; dn.textContent=d; el.appendChild(dn);
    const ss = SCHEDULE[k] || [];
    if (ss.length) {
      const ch = document.createElement('div'); ch.className='cchips';
      ss.slice(0,3).forEach(s => {
        const c = document.createElement('div');
        c.className='cch '+s.type;
        c.textContent = s.name.slice(0,3);
        ch.appendChild(c);
      });
      if (ss.length>3) {
        const mo=document.createElement('div');mo.className='cch';mo.style.background='#444';mo.textContent='+'+(ss.length-3);ch.appendChild(mo);
      }
      el.appendChild(ch);
    }
    el.addEventListener('click',()=>{selD=d;renderCal();showDetail(k,d);});
    g.appendChild(el);
  }
  document.getElementById('month-lbl').textContent=`${cur.y}년 ${cur.m}월`;
}

function showDetail(k,d){
  const ss=SCHEDULE[k]||[];
  document.getElementById('ddate').textContent=`${cur.m}월 ${d}일 (${dayName(cur.y,cur.m,d)})`;
  document.getElementById('dcnt').textContent=ss.length?`수업 ${ss.length}명`:'수업 없음';
  const body=document.getElementById('dbody');
  if(!ss.length){body.innerHTML='<div class="empty-msg">수업이 없는 날이에요</div>';return;}
  body.innerHTML=ss.map(s=>`
    <div class="srow">
      <div class="savatar ${s.type}">${s.name[0]}</div>
      <span class="sname">${s.name}</span>
      <span class="stype-badge ${s.type}">${s.type==='makeup'?'보강':'재시험'}</span>
      <span class="stime">${s.time}</span>
    </div>`).join('');
}

function resetDetail(){
  selD=null;
  document.getElementById('ddate').textContent='날짜를 선택하세요';
  document.getElementById('dcnt').textContent='';
  document.getElementById('dbody').innerHTML='<div class="empty-msg">날짜를 탭하면 수업 학생을 확인해요</div>';
}

document.getElementById('pb').addEventListener('click',()=>{cur.m--;if(cur.m<1){cur.m=12;cur.y--;}resetDetail();renderCal();});
document.getElementById('nb').addEventListener('click',()=>{cur.m++;if(cur.m>12){cur.m=1;cur.y++;}resetDetail();renderCal();});

// 오늘 날짜 자동 이동 — 자정에 갱신
function scheduleAutoRefresh(){
  const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const msToMidnight=((24-now.getHours())*60*60-(now.getMinutes()*60+now.getSeconds()))*1000;
  setTimeout(()=>{location.reload();},msToMidnight);
}

// 오버레이
function openOverlay(type){
  const overlay=document.getElementById('overlay');
  const title=document.getElementById('overlayTitle');
  const body=document.getElementById('overlayBody');
  overlay.classList.add('active');
  body.innerHTML='';
  if(type==='makeup'){
    title.textContent='🟢 보강 테스트';
    body.innerHTML=`<div style="font-size:12px;color:#555;margin-bottom:0.8rem;">대상 학생 ${MAKEUP_STUDENTS.length}명</div>`;
    MAKEUP_STUDENTS.forEach(s=>{
      body.innerHTML+=`<div class="ncard" style="border-left:3px solid #15803d;border-radius:0 10px 10px 0;cursor:default;margin-bottom:6px;">
        <div class="ntop">
          <div class="savatar makeup" style="width:26px;height:26px;">${s.name[0]}</div>
          <span class="ntitle">${s.name}</span>
          <span class="stype-badge makeup">보강</span>
        </div></div>`;
    });
  } else if(type==='retest'){
    title.textContent='🟠 재시험 테스트';
    body.innerHTML=`<div style="font-size:12px;color:#555;margin-bottom:0.8rem;">대상 학생 ${RETEST_STUDENTS.length}명</div>`;
    RETEST_STUDENTS.forEach(s=>{
      body.innerHTML+=`<div class="ncard" style="border-left:3px solid #ea580c;border-radius:0 10px 10px 0;cursor:default;margin-bottom:6px;">
        <div class="ntop">
          <div class="savatar retest" style="width:26px;height:26px;">${s.name[0]}</div>
          <span class="ntitle">${s.name}</span>
          <span class="stype-badge retest">재시험</span>
        </div></div>`;
    });
  } else if(type==='notice'){
    title.textContent='📢 공지사항 전체';
    NOTICES.forEach((n,i)=>{
      const el=document.createElement('div');
      el.className='ncard'+(i===0?' highlight open':'');
      el.style.marginBottom='6px';
      el.innerHTML=`<div class="ntop"><span class="nbadge ${n.badge}">${n.badge}</span><span class="ntitle">${n.title}</span>${n.isNew?'<span class="new-dot"></span>':''}</div>
        <div class="ndate">${n.date}</div><div class="nexpand">${n.content}</div>`;
      el.addEventListener('click',()=>el.classList.toggle('open'));
      body.appendChild(el);
    });
  }
}
function closeOverlay(){document.getElementById('overlay').classList.remove('active');}

renderCal();
scheduleAutoRefresh();

// 오늘 자동 선택
const todayKey=`${TODAY_Y}-${TODAY_M}-${TODAY_D}`;
if(SCHEDULE[todayKey]){selD=TODAY_D;renderCal();showDetail(todayKey,TODAY_D);}
</script>
</body>
</html>
